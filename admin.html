<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MacOffs S2 — Admin Panel</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Oxanium:wght@600;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080a0d;
        --surface: #13161e;
        --border: #252a38;
        --text: #dde3f0;
        --muted: #5a6380;
        --diamond: #38d4f8;
        --eliminated: #ff3a3a;
        --emerald: #40d878;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Oxanium", sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(56, 212, 248, 0.01) 1px, transparent 1px),
          linear-gradient(90deg, rgba(56, 212, 248, 0.01) 1px, transparent 1px);
        background-size: 48px 48px;
        pointer-events: none;
        z-index: 0;
      }
      .admin-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-top: 3px solid var(--diamond);
        width: 100%;
        max-width: 500px;
        padding: 40px;
        position: relative;
        z-index: 1;
      }
      h1 {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 6px;
        letter-spacing: -0.5px;
      }
      .subtitle {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 24px;
      }
      .control-box {
        background: #090b10;
        border: 1px solid var(--border);
        padding: 16px;
        margin-bottom: 24px;
        text-align: center;
      }
      .phase-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 6px;
      }
      .phase-val {
        font-size: 20px;
        font-weight: 700;
        color: var(--diamond);
        margin-bottom: 16px;
      }
      .phase-val.f {
        color: var(--emerald);
      }
      .btn-row {
        display: flex;
        gap: 12px;
      }

      .btn {
        display: block;
        width: 100%;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 16px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
        background: none;
      }
      .btn-half {
        flex: 1;
        padding: 10px;
        border: 1px solid var(--border);
        color: var(--muted);
      }
      .btn-half:hover {
        border-color: var(--text);
        color: var(--text);
        background: rgba(255, 255, 255, 0.05);
      }
      .btn-lock {
        border-color: var(--diamond);
        color: var(--diamond);
        background: rgba(56, 212, 248, 0.06);
        margin-bottom: 24px;
      }
      .btn-lock:hover {
        background: rgba(56, 212, 248, 0.15);
      }
      .btn-clear {
        border-color: var(--eliminated);
        color: var(--eliminated);
        background: rgba(255, 58, 58, 0.06);
        margin-top: 40px;
      }
      .btn-clear:hover {
        background: rgba(255, 58, 58, 0.15);
      }
      .status-log {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        background: #090b10;
        border: 1px solid var(--border);
        padding: 12px;
        color: var(--muted);
        min-height: 40px;
        max-height: 120px;
        overflow-y: auto;
      }
      .log-entry {
        margin-bottom: 4px;
      }
      .log-success {
        color: var(--emerald);
      }
      .log-error {
        color: var(--eliminated);
      }
    </style>
  </head>
  <body>
    <div class="admin-card">
      <h1>Tournament Console</h1>
      <div class="subtitle">MacOffs S2 Control Panel</div>

      <div class="control-box">
        <div class="phase-label">Active Phase</div>
        <div class="phase-val" id="admin-phase-display">Loading Data...</div>
        <div class="btn-row">
          <button onclick="shiftBlock(-1)" class="btn btn-half">
            &lt; Regress
          </button>
          <button onclick="shiftBlock(1)" class="btn btn-half">
            Advance &gt;
          </button>
        </div>
      </div>

      <button onclick="triggerLock()" class="btn btn-lock">
        🔒 Retrieve & Lock Match
      </button>

      <div
        style="
          font-family: &quot;JetBrains Mono&quot;, monospace;
          font-size: 10px;
          color: var(--muted);
          text-transform: uppercase;
          letter-spacing: 1px;
          margin-bottom: 8px;
        "
      >
        Console Output:
      </div>
      <div class="status-log" id="admin-log">
        <div class="log-entry">System ready. Waiting for action...</div>
      </div>

      <button onclick="triggerReset()" class="btn btn-clear">
        ⚠️ Clear Database
      </button>
    </div>

    <script src="data.js"></script>
    <script>
      const logEl = document.getElementById("admin-log");

      // --- Console Logging ---
      function log(message, type = "") {
        const entry = document.createElement("div");
        entry.className = `log-entry ${type ? "log-" + type : ""}`;
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
        logEl.appendChild(entry);
        logEl.scrollTop = logEl.scrollHeight;
      }

      window.alert = (msg) => {
        if (msg.includes("Success")) log(msg, "success");
        else if (
          msg.includes("Failed") ||
          msg.includes("ignored") ||
          msg.includes("already")
        )
          log(msg, "error");
        else log(msg);
      };

      // --- Boot Up sequence for Admin ---
      async function initAdmin() {
        await loadCloudData();
        updatePhaseDisplay();
        log("Connected to Cloud Database.", "success");
      }

      function updatePhaseDisplay() {
        const display = document.getElementById("admin-phase-display");
        if (currentBlock === 3) {
          display.textContent = "Finals (Merged)";
          display.className = "phase-val f";
        } else {
          display.textContent = `Block ${currentBlock}`;
          display.className = "phase-val";
        }
      }

      // --- Admin Actions ---
      async function shiftBlock(direction) {
        let newBlock = currentBlock + direction;

        // Prevent going out of bounds
        if (newBlock < 1) newBlock = 1;
        if (newBlock > 3) newBlock = 3;
        if (newBlock === currentBlock) return;

        // Apply change and push to database
        currentBlock = newBlock;
        updatePhaseDisplay();

        try {
          await saveCloudData();
          log(
            `Advanced tournament phase to: ${currentBlock === 3 ? "Finals" : "Block " + currentBlock}`,
            "success",
          );
        } catch (error) {
          // THIS WILL NOW PRINT THE EXACT ERROR REASON
          console.error(error);
          log(`Failed: ${error.message}`, "error");
        }
      }

      async function triggerLock() {
        log("Querying API for the host's most recent match...");
        await lockLatestMatch();
      }

      function triggerReset() {
        resetTournamentBoard();
        // Reset local block visually if cleared
        setTimeout(() => updatePhaseDisplay(), 1000);
      }

      // Boot up the admin page
      initAdmin();
    </script>
  </body>
</html>
